<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popeyes — Panel de cocina</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
    .header{background:#f26522;padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:12px}
    .header-title{font-size:1rem;font-weight:500;color:#fff;letter-spacing:0.5px}
    .header-badge{background:#fff;color:#f26522;padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:500}
    .main{max-width:1000px;margin:1.5rem auto;padding:0 1.5rem}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
    .stat{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem;text-align:center;border-top:3px solid #f26522}
    .stat-n{font-size:1.8rem;font-weight:500;color:#f26522}
    .stat-l{font-size:0.75rem;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
    .stat-despacho .stat-n{color:#378add}
    .stat-despacho{border-top-color:#378add}
    .stat-reparto .stat-n{color:#1d9e75}
    .stat-reparto{border-top-color:#1d9e75}
    .section-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
    .section-title{font-size:0.85rem;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
    .refresh-tag{font-size:0.75rem;color:#aaa}
    .table-wrap{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    thead{background:#f26522}
    thead th{padding:0.75rem 1rem;text-align:left;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:#fff;font-weight:500}
    tbody tr{border-bottom:0.5px solid #eee;cursor:pointer;transition:background 0.15s}
    tbody tr:hover{background:#fafaf8}
    tbody tr:last-child{border-bottom:none}
    td{padding:0.85rem 1rem;font-size:0.875rem}
    .order-id{font-family:monospace;font-size:0.8rem;color:#f26522;font-weight:500}
    .worker{color:#666;font-size:0.8rem}
    .time{color:#aaa;font-size:0.75rem}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
    .pill-recibido{background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27}
    .pill-cocina{background:#FAECE7;color:#993C1D;border:0.5px solid #D85A30}
    .pill-despacho{background:#E6F1FB;color:#185FA5;border:0.5px solid #378ADD}
    .pill-reparto{background:#E1F5EE;color:#0F6E56;border:0.5px solid #1D9E75}
    .pill-entregado{background:#EAF3DE;color:#3B6D11;border:0.5px solid #639922}
    .pill-timeout{background:#FBEAF0;color:#993556;border:0.5px solid #D4537E}
    .pill-error{background:#FCEBEB;color:#A32D2D;border:0.5px solid #E24B4A}
    .btn-avanzar{background:#f26522;color:#fff;border:none;padding:5px 14px;border-radius:8px;font-size:0.78rem;font-weight:500;cursor:pointer;white-space:nowrap}
    .btn-avanzar:hover{background:#d4551a}
    .chevron{transition:transform 0.2s;display:inline-block;font-size:0.7rem;color:#aaa}
    .chevron.open{transform:rotate(180deg)}
    .detail-box{background:#fafaf8;padding:1rem 1.5rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;border-top:0.5px solid #eee}
    .detail-item label{font-size:0.72rem;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:2px}
    .detail-item span{font-size:0.85rem;color:#1a1a1a;font-weight:500}
    .empty{text-align:center;padding:3rem;color:#aaa;font-size:0.9rem}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#1a1a1a;color:#fff;padding:0.75rem 1.25rem;border-radius:8px;font-size:0.85rem;font-weight:500;opacity:0;transform:translateY(10px);transition:all 0.25s;z-index:1000;border-left:4px solid #f26522}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.error{border-left-color:#E24B4A}
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span style="font-size:1.5rem">🍗</span>
    <span class="header-title">Popeyes — Panel de cocina</span>
  </div>
  <span class="header-badge">TRABAJADORES</span>
</header>

<main class="main">
  <div class="stats">
    <div class="stat">
      <div class="stat-n" id="s-total">0</div>
      <div class="stat-l">Total activos</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="s-cocina">0</div>
      <div class="stat-l">En cocina</div>
    </div>
    <div class="stat stat-despacho">
      <div class="stat-n" id="s-despacho">0</div>
      <div class="stat-l">En despacho</div>
    </div>
    <div class="stat stat-reparto">
      <div class="stat-n" id="s-reparto">0</div>
      <div class="stat-l">En reparto</div>
    </div>
  </div>

  <div class="section-bar">
    <span class="section-title">
      <i class="ti ti-list"></i> Cola de pedidos (FIFO)
    </span>
    <span class="refresh-tag">Auto-refresco en <span id="cd">15</span>s</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px"></th>
          <th style="width:160px">Order ID</th>
          <th style="width:140px">Estado</th>
          <th style="width:120px">Worker</th>
          <th style="width:80px">Hora</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6"><div class="empty">Cargando pedidos...</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://pnj41nhlek.execute-api.us-east-1.amazonaws.com/dev';

const SIGUIENTE = {
  'RECIBIDO':'EN_COCINA','EN_COCINA':'EN_DESPACHO',
  'EN_DESPACHO':'EN_REPARTO','EN_REPARTO':'ENTREGADO'
};
const PILLS = {
  'RECIBIDO':    ['pill-recibido','Recibido'],
  'EN_COCINA':   ['pill-cocina','En cocina'],
  'EN_DESPACHO': ['pill-despacho','En despacho'],
  'EN_REPARTO':  ['pill-reparto','En reparto'],
  'ENTREGADO':   ['pill-entregado','Entregado'],
  'TIMEOUT_COCINA':   ['pill-timeout','Timeout'],
  'TIMEOUT_DESPACHO': ['pill-timeout','Timeout'],
  'TIMEOUT_REPARTO':  ['pill-timeout','Timeout'],
  'ERROR':       ['pill-error','Error'],
};

let expanded = null;

function pill(e) {
  const [c,l] = PILLS[e] || ['pill-error', e];
  return `<span class="pill ${c}">${l}</span>`;
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit'});
}

async function cargarPedidos() {
  try {
    const res  = await fetch(`${API_URL}/tasks/pendientes`);
    const data = await res.json();
    render(data.tareas || []);
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="6"><div class="empty" style="color:#E24B4A">Error al conectar con la API</div></td></tr>`;
  }
}

function render(tareas) {
  document.getElementById('s-total').textContent    = tareas.length;
  document.getElementById('s-cocina').textContent   = tareas.filter(t => t.estado === 'EN_COCINA').length;
  document.getElementById('s-despacho').textContent = tareas.filter(t => t.estado === 'EN_DESPACHO').length;
  document.getElementById('s-reparto').textContent  = tareas.filter(t => t.estado === 'EN_REPARTO').length;

  const tb = document.getElementById('tbody');
  if (!tareas.length) {
    tb.innerHTML = `<tr><td colspan="6"><div class="empty">Sin pedidos pendientes 🎉</div></td></tr>`;
    return;
  }

  let html = '';
  tareas.forEach(t => {
    const isExp = expanded === t.orderId;
    const sig   = SIGUIENTE[t.estado];
    html += `
      <tr onclick="toggle('${t.orderId}')">
        <td style="text-align:center"><span class="chevron ${isExp ? 'open' : ''}">&#9660;</span></td>
        <td><span class="order-id">${t.orderId}</span></td>
        <td>${pill(t.estado)}</td>
        <td><span class="worker">${t.workerId || '—'}</span></td>
        <td><span class="time">${fmt(t.timestamp)}</span></td>
        <td>${sig
          ? `<button class="btn-avanzar" onclick="event.stopPropagation();avanzar('${t.orderId}','${t.estado}')">
               Avanzar &rarr; ${sig.replace(/_/g,' ')}
             </button>`
          : '<span style="color:#aaa;font-size:0.8rem">—</span>'
        }</td>
      </tr>`;
    if (isExp) {
      html += `
        <tr>
          <td colspan="6" style="padding:0;border-bottom:0.5px solid #eee">
            <div class="detail-box">
              <div class="detail-item"><label>Order ID</label><span>${t.orderId}</span></div>
              <div class="detail-item"><label>Tenant</label><span>${t.tenantId || '—'}</span></div>
              <div class="detail-item"><label>Worker</label><span>${t.workerId || '—'}</span></div>
              <div class="detail-item"><label>Estado actual</label><span>${t.estado}</span></div>
              <div class="detail-item"><label>Siguiente paso</label><span>${sig || 'Completado'}</span></div>
              <div class="detail-item"><label>Recibido</label><span>${fmt(t.timestamp)}</span></div>
            </div>
          </td>
        </tr>`;
    }
  });
  tb.innerHTML = html;
}

function toggle(id) {
  expanded = expanded === id ? null : id;
  cargarPedidos();
}

async function avanzar(orderId, estado) {
  if (!confirm(`¿Completar "${estado.replace(/_/g,' ')}" para ${orderId}?`)) return;
  try {
    const res  = await fetch(`${API_URL}/tasks/completar`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({orderId, estado})
    });
    const data = await res.json();
    data.ok ? showToast(`Pedido ${orderId} avanzado`) : showToast(`Error: ${data.error}`, true);
    cargarPedidos();
  } catch(e) {
    showToast('Error de conexión', true);
  }
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

let secs = 15;
setInterval(() => {
  document.getElementById('cd').textContent = secs;
  if (--secs < 0) { secs = 15; cargarPedidos(); }
}, 1000);

cargarPedidos();
</script>
</body>
</html>
