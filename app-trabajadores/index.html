<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popeyes — Panel de Cocina</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: #f26522;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo img {
      height: 40px;
    }
    .header-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-badge {
      background: #fff;
      color: #f26522;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* MAIN */
    .main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      border-left: 4px solid #f26522;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: #f26522;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* SECTION TITLE */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f26522;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .refresh-info {
      font-size: 0.8rem;
      color: #888;
    }

    /* TABLE */
    .table-wrapper {
      background: #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #f26522;
    }
    thead th {
      padding: 1rem 1.2rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      font-weight: 700;
    }
    tbody tr {
      border-bottom: 1px solid #3a3a3a;
      transition: background 0.2s;
    }
    tbody tr:hover { background: #333; }
    tbody tr:last-child { border-bottom: none; }
    td {
      padding: 1rem 1.2rem;
      font-size: 0.95rem;
    }
    .order-id {
      font-family: monospace;
      font-size: 0.9rem;
      color: #f26522;
      font-weight: 600;
    }
    .worker-id {
      color: #ccc;
      font-size: 0.85rem;
    }
    .timestamp {
      color: #888;
      font-size: 0.8rem;
    }

    /* PILLS */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pill-recibido    { background: #3a3a1a; color: #f0c040; border: 1px solid #f0c040; }
    .pill-cocina      { background: #3a1a1a; color: #f26522; border: 1px solid #f26522; }
    .pill-despacho    { background: #1a2a3a; color: #4aa8f0; border: 1px solid #4aa8f0; }
    .pill-reparto     { background: #1a3a2a; color: #40c080; border: 1px solid #40c080; }
    .pill-entregado   { background: #1a3a1a; color: #60d060; border: 1px solid #60d060; }
    .pill-timeout     { background: #3a1a2a; color: #f04060; border: 1px solid #f04060; }
    .pill-error       { background: #3a0000; color: #ff4040; border: 1px solid #ff4040; }

    /* BUTTONS */
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: #f26522;
      color: #fff;
    }
    .btn-primary:hover {
      background: #d4551a;
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    /* EMPTY / LOADING */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #666;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-text { font-size: 1.1rem; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #2a2a2a;
      border-left: 4px solid #f26522;
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      font-weight: 600;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.error { border-left-color: #f04060; }

    /* COUNTDOWN */
    #countdown {
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <span style="font-size:2rem">🍗</span>
      <span class="header-title">Popeyes — Panel de Cocina</span>
    </div>
    <span class="header-badge">TRABAJADORES</span>
  </header>

  <main class="main">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">Total activos</div>
      </div>
      <div class="stat-card" style="border-left-color:#f26522">
        <div class="stat-number" style="color:#f26522" id="stat-cocina">0</div>
        <div class="stat-label">En cocina</div>
      </div>
      <div class="stat-card" style="border-left-color:#4aa8f0">
        <div class="stat-number" style="color:#4aa8f0" id="stat-despacho">0</div>
        <div class="stat-label">En despacho</div>
      </div>
      <div class="stat-card" style="border-left-color:#40c080">
        <div class="stat-number" style="color:#40c080" id="stat-reparto">0</div>
        <div class="stat-label">En reparto</div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="section-header">
      <span class="section-title">🍗 Cola de pedidos (FIFO)</span>
      <span class="refresh-info">Auto-refresco en <span id="countdown">15</span>s</span>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Order ID</th>
            <th>Estado</th>
            <th>Worker</th>
            <th>Recibido</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="filas-pedidos">
          <tr><td colspan="6">
            <div class="empty-state">
              <div class="empty-icon">⏳</div>
              <div class="empty-text">Cargando pedidos...</div>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <script>
    const API_URL = 'https://pnj41nhlek.execute-api.us-east-1.amazonaws.com/dev';

    const SIGUIENTE = {
      'RECIBIDO':    'EN_COCINA',
      'EN_COCINA':   'EN_DESPACHO',
      'EN_DESPACHO': 'EN_REPARTO',
      'EN_REPARTO':  'ENTREGADO'
    };

    const PILLS = {
      'RECIBIDO':    ['pill-recibido',  '🟡 RECIBIDO'],
      'EN_COCINA':   ['pill-cocina',    '🔥 EN COCINA'],
      'EN_DESPACHO': ['pill-despacho',  '📦 EN DESPACHO'],
      'EN_REPARTO':  ['pill-reparto',   '🛵 EN REPARTO'],
      'ENTREGADO':   ['pill-entregado', '✅ ENTREGADO'],
      'TIMEOUT_COCINA':   ['pill-timeout', '⏰ TIMEOUT'],
      'TIMEOUT_DESPACHO': ['pill-timeout', '⏰ TIMEOUT'],
      'TIMEOUT_REPARTO':  ['pill-timeout', '⏰ TIMEOUT'],
      'ERROR':       ['pill-error', '❌ ERROR'],
    };

    function pill(estado) {
      const [cls, label] = PILLS[estado] || ['pill-error', estado];
      return `<span class="pill ${cls}">${label}</span>`;
    }

    function formatTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit'});
    }

    async function cargarPedidos() {
      try {
        const res  = await fetch(`${API_URL}/tasks/pendientes`);
        const data = await res.json();
        renderTabla(data.tareas || []);
      } catch(e) {
        document.getElementById('filas-pedidos').innerHTML =
          `<tr><td colspan="6"><div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-text" style="color:#f04060">Error al conectar con la API</div>
          </div></td></tr>`;
      }
    }

    function renderTabla(tareas) {
      const tbody = document.getElementById('filas-pedidos');

      // Actualizar stats
      document.getElementById('stat-total').textContent    = tareas.length;
      document.getElementById('stat-cocina').textContent   = tareas.filter(t => t.estado === 'EN_COCINA').length;
      document.getElementById('stat-despacho').textContent = tareas.filter(t => t.estado === 'EN_DESPACHO').length;
      document.getElementById('stat-reparto').textContent  = tareas.filter(t => t.estado === 'EN_REPARTO').length;

      if (!tareas.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
          <div class="empty-icon">🎉</div>
          <div class="empty-text">Sin pedidos pendientes</div>
        </div></td></tr>`;
        return;
      }

      tbody.innerHTML = tareas.map((t, i) => `
        <tr>
          <td style="color:#888">${i + 1}</td>
          <td><span class="order-id">${t.orderId}</span></td>
          <td>${pill(t.estado)}</td>
          <td><span class="worker-id">${t.workerId || '—'}</span></td>
          <td><span class="timestamp">${formatTime(t.timestamp)}</span></td>
          <td>
            ${SIGUIENTE[t.estado]
              ? `<button class="btn btn-primary"
                   onclick="avanzar('${t.orderId}','${t.estado}')">
                   Avanzar → ${SIGUIENTE[t.estado].replace('_',' ')}
                 </button>`
              : '<span style="color:#555">—</span>'}
          </td>
        </tr>`).join('');
    }

    async function avanzar(orderId, estado) {
      if (!confirm(`¿Marcar "${estado}" como completado para ${orderId}?`)) return;
      try {
        const res  = await fetch(`${API_URL}/tasks/completar`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({orderId, estado})
        });
        const data = await res.json();
        if (data.ok) {
          showToast(`✅ ${orderId} avanzado correctamente`);
          cargarPedidos();
        } else {
          showToast(`❌ Error: ${data.error}`, true);
        }
      } catch(e) {
        showToast('❌ Error de conexión', true);
      }
    }

    function showToast(msg, error = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (error ? ' error' : '');
      setTimeout(() => t.className = 'toast', 3000);
    }

    // Countdown y auto-refresco
    let seconds = 15;
    function tick() {
      document.getElementById('countdown').textContent = seconds;
      if (--seconds < 0) {
        seconds = 15;
        cargarPedidos();
      }
    }

    cargarPedidos();
    setInterval(tick, 1000);
  </script>
</body>
</html>
